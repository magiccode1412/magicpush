# API 请求频率限制（兜底保护，宽松阈值）
# 500 请求/分钟/IP，突发允许 100 个排队
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=500r/m;
# 限制并发连接数
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # 全局并发连接限制
    limit_conn conn_limit 50;

    # 自定义限流错误页
    error_page 503 = @rate_limited;
    location @rate_limited {
        default_type application/json;
        return 429 '{"success":false,"code":429,"message":"请求过于频繁，请稍后再试"}';
    }

    # 前端路由支持
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 代理到后端（Nginx 层限流兜底）
    location /api/ {
        limit_req zone=api_limit burst=100 nodelay;
        limit_req_status 429;

        proxy_pass http://server:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }
}
